<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home · linkedin-mcp-pro</title>
  {% include "_shell.html" %}
</head>
<body>
  <main class="pt-14 min-h-screen md:ml-[240px]" x-data="homePage()" x-init="init()">
    <div class="max-w-6xl mx-auto px-6 py-8">

      <!-- Greeting + greeting time-aware -->
      <div class="mb-6">
        <h1 class="text-2xl font-semibold text-fg-primary tracking-tight" x-text="greeting"></h1>
        <p class="text-sm text-fg-secondary mt-1" x-text="subtitle"></p>
      </div>

      <!-- KPI row -->
      <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
        <div class="card p-4">
          <div class="text-[10px] font-semibold uppercase tracking-wider text-fg-tertiary mb-1.5">Posts</div>
          <div class="text-2xl font-semibold tabular text-fg-primary" x-text="stats.posts">0</div>
          <div class="text-[11px] text-fg-tertiary mt-1">last 7 days</div>
        </div>
        <div class="card p-4">
          <div class="text-[10px] font-semibold uppercase tracking-wider text-fg-tertiary mb-1.5">Engagements</div>
          <div class="text-2xl font-semibold tabular text-fg-primary" x-text="stats.engagements">0</div>
          <div class="text-[11px] text-fg-tertiary mt-1">last 30 days</div>
        </div>
        <div class="card p-4">
          <div class="text-[10px] font-semibold uppercase tracking-wider text-fg-tertiary mb-1.5">Applications</div>
          <div class="text-2xl font-semibold tabular text-fg-primary" x-text="stats.applications">0</div>
          <div class="text-[11px] text-fg-tertiary mt-1">jobs · last 30d</div>
        </div>
        <div class="card p-4">
          <div class="text-[10px] font-semibold uppercase tracking-wider text-fg-tertiary mb-1.5">Server</div>
          <div class="flex items-center gap-2">
            <span class="dot-pulse"></span>
            <span class="text-2xl font-semibold tabular text-fg-primary" x-text="stats.version">v2.3.0</span>
          </div>
          <div class="text-[11px] text-fg-tertiary mt-1" x-text="`uptime ${stats.uptime}`"></div>
        </div>
      </div>

      <!-- Quick actions -->
      <div class="flex flex-wrap gap-2 mb-6">
        <a href="/static/drafts.html" class="btn btn-primary">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
          New post
        </a>
        <a href="/static/jobs.html" class="btn btn-ghost">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
          Browse jobs
        </a>
        <a href="/static/schedules.html" class="btn btn-ghost">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
          Schedule
        </a>
        <a href="/static/engagement.html" class="btn btn-ghost">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
          Engage
        </a>
      </div>

      <!-- Main 2-col -->
      <div class="grid lg:grid-cols-3 gap-4">

        <!-- Left: Activity feed -->
        <div class="lg:col-span-2 card p-5">
          <div class="flex items-center justify-between mb-4">
            <h2 class="text-base font-semibold text-fg-primary">Recent activity</h2>
            <a href="/static/audit.html" class="text-xs text-fg-secondary hover:text-fg-primary">View all →</a>
          </div>
          <template x-if="activities.length === 0">
            <div class="text-center py-12">
              <div class="w-12 h-12 mx-auto rounded-full bg-[var(--surface-subtle)] flex items-center justify-center mb-3">
                <svg class="w-6 h-6 text-fg-tertiary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
              </div>
              <p class="text-sm text-fg-secondary mb-3">No activity yet</p>
              <a href="/static/drafts.html" class="btn btn-primary">Write your first post</a>
            </div>
          </template>
          <template x-for="a in activities.slice(0,8)" :key="a.id">
            <div class="flex items-start gap-3 py-3 border-b border-[var(--border-default)] last:border-0">
              <div class="w-8 h-8 rounded-md bg-[var(--surface-subtle)] flex items-center justify-center text-fg-tertiary flex-shrink-0">
                <svg x-show="a.action === 'post'" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5"/></svg>
                <svg x-show="a.action === 'apply'" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745"/></svg>
                <svg x-show="!['post','apply'].includes(a.action)" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
              </div>
              <div class="flex-1 min-w-0">
                <div class="text-sm text-fg-primary font-medium" x-text="a.label"></div>
                <div class="text-xs text-fg-tertiary mt-0.5" x-text="a.target"></div>
              </div>
              <span class="text-[11px] text-fg-tertiary whitespace-nowrap" x-text="relTime(a.ts)"></span>
            </div>
          </template>
        </div>

        <!-- Right column: Status + Setup -->
        <div class="space-y-4">
          <div class="card p-5">
            <h3 class="text-xs font-semibold uppercase tracking-wider text-fg-tertiary mb-3">System status</h3>
            <div class="space-y-2.5 text-sm">
              <div class="flex items-center justify-between">
                <span class="text-fg-secondary">Cookie</span>
                <span class="flex items-center gap-1.5">
                  <span :class="status.cookie === 'valid' ? 'bg-success' : 'bg-warning'" class="w-2 h-2 rounded-full"></span>
                  <span class="text-fg-primary text-xs font-medium" x-text="status.cookie || 'unknown'"></span>
                </span>
              </div>
              <div class="flex items-center justify-between">
                <span class="text-fg-secondary">LLM keys</span>
                <span class="text-fg-primary text-xs font-medium tabular" x-text="status.llm_keys || 0"></span>
              </div>
              <div class="flex items-center justify-between">
                <span class="text-fg-secondary">Schedules</span>
                <span class="text-fg-primary text-xs font-medium tabular" x-text="status.schedules || 0"></span>
              </div>
              <div class="flex items-center justify-between">
                <span class="text-fg-secondary">Applications</span>
                <span class="text-fg-primary text-xs font-medium tabular" x-text="status.applications || 0"></span>
              </div>
            </div>
          </div>

          <div class="card p-5" x-show="setupSteps.some(s => !s.done)">
            <div class="flex items-center justify-between mb-3">
              <h3 class="text-xs font-semibold uppercase tracking-wider text-fg-tertiary">Setup</h3>
              <span class="text-[11px] text-fg-tertiary tabular" x-text="`${setupSteps.filter(s=>s.done).length}/${setupSteps.length}`"></span>
            </div>
            <div class="space-y-2">
              <template x-for="(s,i) in setupSteps" :key="i">
                <a :href="s.href" class="flex items-start gap-2.5 p-2 rounded-md hover-surface group">
                  <span :class="s.done ? 'bg-success text-white' : 'bg-[var(--surface-subtle)] text-fg-tertiary'" class="w-5 h-5 rounded-full flex items-center justify-center text-[10px] font-bold flex-shrink-0 mt-0.5">
                    <span x-show="s.done">✓</span>
                    <span x-show="!s.done" x-text="i+1"></span>
                  </span>
                  <div class="flex-1 min-w-0">
                    <div class="text-sm font-medium text-fg-primary" x-text="s.label"></div>
                    <div class="text-[11px] text-fg-tertiary" x-text="s.detail"></div>
                  </div>
                </a>
              </template>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    function homePage() {
      return {
        greeting: '', subtitle: '',
        stats: { posts:0, engagements:0, applications:0, version:'v2.3.0', uptime:'—' },
        status: { cookie: 'unknown', llm_keys:0, schedules:0, applications:0 },
        activities: [],
        setupSteps: [
          { label:'Connect LinkedIn', detail:'Add a session cookie', done:false, href:'/static/connect.html' },
          { label:'Add LLM key', detail:'For post drafting', done:false, href:'/static/llm.html' },
          { label:'Install to agent', detail:'Claude / Cursor / etc.', done:false, href:'/static/install.html' },
        ],
        async init() {
          // Time-aware greeting
          const h = new Date().getHours();
          this.greeting = h < 12 ? 'Good morning' : h < 18 ? 'Good afternoon' : 'Good evening';
          this.subtitle = new Date().toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });

          // Stats
          try {
            const v = await fetch('/api/version').then(r=>r.json());
            this.stats.version = v.version || 'v2.3.0';
            this.stats.uptime = v.uptime_human || '—';
          } catch {}

          try {
            const s = await fetch('/api/summary').then(r=>r.json());
            if (s) {
              this.stats.posts = s.posts_total || 0;
              this.stats.engagements = s.engagements_total || 0;
              this.stats.applications = s.applications_total || 0;
              this.status = s.status || this.status;
            }
          } catch {}

          // Setup steps from existing endpoints
          try {
            const c = await fetch('/api/cookies/status').then(r=>r.json()).catch(()=>({valid:false}));
            this.setupSteps[0].done = !!c.valid;
            this.status.cookie = c.valid ? 'valid' : 'missing';
          } catch {}

          try {
            const ll = await fetch('/api/llm/keys').then(r=>r.json()).catch(()=>[]);
            this.setupSteps[1].done = Array.isArray(ll) && ll.length > 0;
            this.status.llm_keys = Array.isArray(ll) ? ll.length : 0;
          } catch {}

          // Activity
          try {
            const events = await fetch('/api/audit?limit=10').then(r=>r.json()).catch(()=>null);
            const arr = Array.isArray(events) ? events : (events && events.events) ? events.events : [];
            this.activities = arr.map(e => ({
              id: e.id || Math.random(),
              action: e.action || 'event',
              label: e.action || 'Event',
              target: e.target || (e.detail && JSON.stringify(e.detail)) || '',
              ts: e.ts || e.timestamp || new Date().toISOString(),
              result: e.result,
            }));
          } catch {}
        },
        relTime(iso) {
          if (!iso) return '';
          const diff = Date.now() - new Date(iso).getTime();
          const min = Math.floor(diff/60000);
          if (min < 1) return 'just now';
          if (min < 60) return `${min}m`;
          const h = Math.floor(min/60);
          if (h < 24) return `${h}h`;
          const d = Math.floor(h/24);
          if (d < 7) return `${d}d`;
          return new Date(iso).toLocaleDateString();
        }
      };
    }
  </script>
</body>
</html>

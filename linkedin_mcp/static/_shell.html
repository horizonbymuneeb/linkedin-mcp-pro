<!--
  LinkedIn MCP Pro -- Unified app shell (partial).
  Pages include this via the include directive in web.py
  (resolved server-side; no Jinja runtime required).
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        colors: {
          // Linear dark surfaces
          'app-bg': '#08090a',
          'app-panel': '#0f1011',
          'app-surface': '#191a1b',
          'app-elevated': '#28282c',
          // LinkedIn brand (used in content cards)
          'li-blue': '#0a66c2',
          'li-blue-dark': '#004182',
          'li-bg': '#f4f2ee',
          'li-card': '#ffffff',
          'li-border': '#e0dfdc',
          'li-text': 'rgba(0, 0, 0, 0.9)',
          'li-text-2': 'rgba(0, 0, 0, 0.6)',
          'li-text-3': 'rgba(0, 0, 0, 0.4)',
          'li-accent': '#057642',
          // Linear brand accents
          'accent': {
            DEFAULT: '#5e6ad2',
            hover: '#7170ff',
            subtle: 'rgba(94,106,210,0.10)',
          },
          // Status
          'success': '#10b981',
          'warning': '#f59e0b',
          'danger':  '#ef4444',
          // Text on dark
          'fg-d': {
            primary: '#f7f8f8',
            secondary: '#d0d6e0',
            tertiary: '#8a8f98',
            muted: '#62666d',
          },
        },
        fontFamily: {
          sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'system-ui', 'sans-serif'],
          mono: ['JetBrains Mono', 'ui-monospace', 'SFMono-Regular', 'monospace'],
        },
        fontSize: {
          'xs': ['12px', { lineHeight: '16px' }],
          'sm': ['13px', { lineHeight: '18px' }],
          'base': ['14px', { lineHeight: '20px' }],
          'md': ['16px', { lineHeight: '24px' }],
          'lg': ['20px', { lineHeight: '28px' }],
          'xl': ['24px', { lineHeight: '32px' }],
          '2xl': ['32px', { lineHeight: '40px' }],
        },
        borderRadius: { 'sm': '4px', 'md': '6px', 'lg': '8px', 'xl': '12px' },
      },
    },
  };
</script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
<style>
  html, body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  [x-cloak] { display: none !important; }
  .tabular { font-variant-numeric: tabular-nums; }
  .hairline { border: 1px solid #ebebeb; }
  .hairline-dark { border: 1px solid rgba(255,255,255,0.08); }
  .focus-ring:focus-visible { outline: 2px solid #5e6ad2; outline-offset: 2px; border-radius: 4px; }

  /* Light mode tokens */
  :root {
    --surface-page: #fafafa;
    --surface-card: #ffffff;
    --surface-subtle: #f5f5f5;
    --surface-hover: #fafafa;
    --border-default: #ebebeb;
    --border-strong: #e0e0e0;
    --fg-primary: #171717;
    --fg-secondary: #525252;
    --fg-tertiary: #8a8a8a;
  }
  html.dark {
    --surface-page: #08090a;
    --surface-card: #0f1011;
    --surface-subtle: #191a1b;
    --surface-hover: #191a1b;
    --border-default: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.16);
    --fg-primary: #f7f8f8;
    --fg-secondary: #d0d6e0;
    --fg-tertiary: #8a8f98;
  }
  body { background: var(--surface-page); color: var(--fg-primary); }
  .surface-card { background: var(--surface-card); }
  .surface-subtle { background: var(--surface-subtle); }
  .hairline { border: 1px solid var(--border-default); }
  .hairline-b { border-bottom: 1px solid var(--border-default); }
  .text-fg-primary { color: var(--fg-primary); }
  .text-fg-secondary { color: var(--fg-secondary); }
  .text-fg-tertiary { color: var(--fg-tertiary); }
  .hover-surface:hover { background: var(--surface-hover); }

  /* Sidebar nav item */
  .nav-item { display:flex; align-items:center; gap:10px; padding: 7px 10px; border-radius: 6px; color: var(--fg-secondary); font-size: 13px; font-weight: 500; transition: background 150ms ease; }
  .nav-item:hover { background: var(--surface-hover); color: var(--fg-primary); }
  .nav-item.active { background: rgba(94,106,210,0.12); color: #5e6ad2; }
  html.dark .nav-item.active { background: rgba(94,106,210,0.18); color: #7170ff; }

  /* Card */
  .card { background: var(--surface-card); border: 1px solid var(--border-default); border-radius: 10px; }

  /* Button styles */
  .btn { display:inline-flex; align-items:center; gap:6px; padding: 6px 12px; border-radius: 6px; font-size: 13px; font-weight: 500; transition: background 150ms ease, border-color 150ms ease; cursor: pointer; }
  .btn-primary { background: #5e6ad2; color: white; }
  .btn-primary:hover { background: #7170ff; }
  .btn-ghost { background: transparent; color: var(--fg-secondary); border: 1px solid var(--border-default); }
  .btn-ghost:hover { background: var(--surface-hover); color: var(--fg-primary); }
  .btn-danger { background: #ef4444; color: white; }

  /* Pulse dot */
  .dot-pulse { width: 6px; height: 6px; border-radius: 50%; background: #10b981; box-shadow: 0 0 0 0 rgba(16,185,129,0.5); animation: dot-pulse 2s infinite; }
  @keyframes dot-pulse {
    0% { box-shadow: 0 0 0 0 rgba(16,185,129,0.5); }
    70% { box-shadow: 0 0 0 6px rgba(16,185,129,0); }
    100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 6px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--fg-tertiary); }

  /* Legacy Pico-class fallbacks (so old pages don't look broken) */
  .card { padding: 16px; border-radius: 10px; background: var(--surface-card); border: 1px solid var(--border-default); margin-bottom: 16px; }
  .grid { display: grid; gap: 16px; }
  @media (min-width: 800px) { .grid { grid-template-columns: 1fr 1fr; } }
  .pill { display: inline-block; padding: 2px 8px; border-radius: 999px; background: var(--surface-subtle); font-size: 11px; color: var(--fg-secondary); margin-right: 4px; }
  .sub { color: var(--fg-tertiary); }
  h1 { font-size: 24px; font-weight: 600; margin: 0 0 4px; color: var(--fg-primary); }
  h2 { font-size: 16px; font-weight: 600; margin: 24px 0 12px; color: var(--fg-primary); }
  h3 { font-size: 14px; font-weight: 600; color: var(--fg-primary); }
  pre { background: var(--surface-subtle); padding: 12px; border-radius: 6px; overflow-x: auto; font-size: 12px; color: var(--fg-primary); border: 1px solid var(--border-default); }
  code { background: var(--surface-subtle); padding: 1px 6px; border-radius: 3px; font-size: 12px; color: var(--fg-primary); }
  table { font-size: 13px; border-collapse: collapse; width: 100%; }
  table th, table td { padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border-default); color: var(--fg-primary); }
  table th { font-weight: 600; color: var(--fg-secondary); font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; }
  table tr:hover { background: var(--surface-hover); }
  button { font: inherit; padding: 8px 14px; border: 1px solid var(--border-default); border-radius: 6px; background: var(--surface-card); color: var(--fg-primary); cursor: pointer; transition: background 150ms ease; }
  button:hover { background: var(--surface-hover); }
  button.secondary { background: var(--surface-subtle); }
  button.danger { background: #ef4444; color: white; border-color: #ef4444; }
  button.danger:hover { background: #dc2626; }
  input, textarea { font: 13px ui-monospace, monospace; padding: 8px 10px; border: 1px solid var(--border-default); border-radius: 6px; background: var(--surface-card); color: var(--fg-primary); }
  input:focus, textarea:focus { outline: none; border-color: #5e6ad2; box-shadow: 0 0 0 3px rgba(94,106,210,0.15); }
  .ok { color: #10b981; font-weight: 600; }
  .warn { color: #f59e0b; font-weight: 600; }
  .alert { color: #ef4444; font-weight: 600; }
  .stat { display: inline-block; padding: 8px 14px; border-radius: 6px; background: var(--surface-subtle); margin-right: 8px; }
  .stat strong { display: block; font-size: 18px; color: var(--fg-primary); }
  .stat span { font-size: 11px; color: var(--fg-tertiary); }
  details { margin: 8px 0; }
  summary { cursor: pointer; font-weight: 600; padding: 4px 0; color: var(--fg-primary); }
</style>

<!--
  The actual shell markup.
  Each page should:
    1. Include this file (or copy the <header>/<aside>).
    2. Wrap its content in <main class="ml-[240px] pt-[56px] min-h-screen"> ... </main>
-->
<div x-data="{
    theme: (() => { try { return localStorage.getItem('theme') || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'); } catch(e) { return 'light'; } })(),
    sidebarOpen: window.innerWidth >= 1024,
    toggleTheme() { this.theme = this.theme === 'dark' ? 'light' : 'dark'; localStorage.setItem('theme', this.theme); document.documentElement.classList.toggle('dark', this.theme==='dark'); },
    init() {
      document.documentElement.classList.toggle('dark', this.theme==='dark');
      window.addEventListener('resize', () => { if (window.innerWidth >= 1024) this.sidebarOpen = true; });
      this.$watch('theme', v => { document.documentElement.classList.toggle('dark', v==='dark'); localStorage.setItem('theme', v); });
    }
  }" x-init="init()">

  <!-- Top bar -->
  <header class="fixed top-0 left-0 right-0 h-14 bg-[var(--surface-card)] hairline-b z-40 flex items-center px-5 gap-4">
    <button @click="sidebarOpen = !sidebarOpen" class="md:hidden p-2 -ml-2 rounded-md hover-surface focus-ring" aria-label="Toggle menu">
      <svg class="w-5 h-5 text-fg-secondary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <a href="/" class="flex items-center gap-2 focus-ring rounded">
      <div class="w-7 h-7 rounded-md bg-li-blue flex items-center justify-center text-white font-bold text-[15px]">in</div>
      <span class="text-sm font-semibold text-fg-primary">linkedin-mcp-pro</span>
      <span class="text-[11px] text-fg-tertiary font-mono ml-1">v2.3.0</span>
    </a>

    <!-- Search -->
    <div class="flex-1 max-w-md mx-auto relative">
      <input type="search" placeholder="Search…" class="w-full h-8 pl-8 pr-12 text-sm bg-[var(--surface-subtle)] hairline rounded-md focus:outline-none focus:border-accent text-fg-primary placeholder:text-fg-tertiary" />
      <svg class="absolute left-2.5 top-2 w-4 h-4 text-fg-tertiary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M11 19a8 8 0 110-16 8 8 0 010 16z"/></svg>
      <kbd class="absolute right-2 top-1.5 px-1.5 py-0.5 text-[10px] font-mono bg-[var(--surface-card)] hairline rounded text-fg-tertiary">⌘K</kbd>
    </div>

    <div class="flex items-center gap-1">
      <button @click="toggleTheme()" class="p-2 rounded-md hover-surface focus-ring" :title="theme === 'dark' ? 'Light mode' : 'Dark mode'">
        <svg x-show="theme !== 'dark'" class="w-4 h-4 text-fg-secondary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
        <svg x-show="theme === 'dark'" x-cloak class="w-4 h-4 text-fg-secondary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
      </button>
      <a href="/static/install.html" class="p-2 rounded-md hover-surface focus-ring" title="Install">
        <svg class="w-4 h-4 text-fg-secondary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
      </a>
      <a href="/static/settings.html" class="p-2 rounded-md hover-surface focus-ring" title="Settings">
        <svg class="w-4 h-4 text-fg-secondary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>

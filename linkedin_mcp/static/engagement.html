<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auto-Engagement · linkedin-mcp-pro</title>
  {% include "_shell.html" %}
</head>
<body x-data="engagementPanel()" x-init="init()">
<main class="pt-14 min-h-screen md:ml-[240px]">
    <div class="max-w-6xl mx-auto px-6 py-8">




  <div class="rounded-2xl bg-gradient-to-br from-purple-500 to-fuchsia-600 text-white p-8 shadow-xl mb-8">
    <h1 class="text-3xl font-bold mb-2">Auto-Engagement</h1>
    <p class="text-purple-50">Automate likes, comments, and connection requests</p>
  </div>

  <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
    <template x-for="k in kpis" :key="k.label">
      <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 p-5 hover:shadow-lg hover:-translate-y-0.5 transition">
        <div class="text-sm text-gray-500 dark:text-gray-400 mb-1" x-text="k.label"></div>
        <div class="text-2xl font-bold mb-3" x-text="k.value"></div>
        <svg class="w-full h-8" viewBox="0 0 100 30" preserveAspectRatio="none">
          <polyline fill="none" :stroke="k.color" stroke-width="2" :points="k.spark"></polyline>
        </svg>
      </div>
    </template>
  </div>

  <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 overflow-hidden">
    <div class="border-b border-gray-200 dark:border-gray-800 px-2">
      <div class="flex gap-1">
        <template x-for="t in ['likes', 'comments', 'connects']" :key="t">
          <button @click="tab = t" :class="tab === t ? 'border-li-blue text-li-blue' : 'border-transparent text-gray-500 hover:text-gray-700 dark:hover:text-gray-300'" class="px-4 py-3 text-sm font-medium border-b-2 capitalize transition" x-text="t"></button>
        </template>
      </div>
    </div>

    <div class="p-6">
      <form @submit.prevent="run()" class="space-y-4">
        <div>
          <label class="block text-sm font-medium mb-1">Keyword / target</label>
          <input type="text" x-model="keyword" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-700 rounded-lg bg-white dark:bg-gray-800 focus:ring-2 focus:ring-li-blue focus:border-transparent" placeholder="e.g. AI startups, product managers">
        </div>
        <label class="flex items-center gap-2 text-sm">
          <input type="checkbox" x-model="dryRun" class="rounded">
          <span>Dry run (preview only)</span>
        </label>
        <button type="submit" :disabled="running" class="px-4 py-2 bg-li-blue hover:bg-li-blue-dark disabled:opacity-50 text-white rounded-lg font-medium transition" x-text="running ? 'Running…' : 'Run'"></button>
      </form>

      <div x-show="results.length > 0" class="mt-6">
        <h3 class="text-sm font-semibold mb-2 text-gray-700 dark:text-gray-300">Recent results</h3>
        <div class="overflow-x-auto rounded-lg border border-gray-200 dark:border-gray-800">
          <table class="w-full text-sm">
            <thead class="bg-gray-50 dark:bg-gray-800/50">
              <tr><th class="text-left px-3 py-2 font-medium">Time</th><th class="text-left px-3 py-2 font-medium">Target</th><th class="text-left px-3 py-2 font-medium">Status</th></tr>
            </thead>
            <tbody>
              <template x-for="(r, i) in results" :key="i">
                <tr class="border-t border-gray-200 dark:border-gray-800 hover:bg-gray-50 dark:hover:bg-gray-800/50 transition">
                  <td class="px-3 py-2 font-mono text-xs" x-text="r.time"></td>
                  <td class="px-3 py-2" x-text="r.target"></td>
                  <td class="px-3 py-2"><span :class="r.status === 'ok' ? 'text-emerald-600 dark:text-emerald-400' : 'text-red-600 dark:text-red-400'" x-text="r.status"></span></td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
  </div>


<script>
function engagementPanel() {
  return {
    dark: document.documentElement.classList.contains('dark'),
    tab: 'likes',
    keyword: '',
    dryRun: true,
    running: false,
    results: [],
    kpis: [
      { label: 'Total likes', value: 1247, color: '#0a66c2', spark: '0,20 10,18 20,15 30,12 40,14 50,10 60,8 70,5 80,7 90,3 100,2' },
      { label: 'Total comments', value: 312, color: '#a855f7', spark: '0,25 10,22 20,20 30,18 40,15 50,17 60,12 70,10 80,8 90,6 100,5' },
      { label: 'Total connects', value: 89, color: '#ec4899', spark: '0,22 10,20 20,18 30,15 40,17 50,14 60,12 70,10 80,8 90,7 100,6' },
      { label: 'Engagement rate', value: '4.2%', color: '#10b981', spark: '0,15 10,17 20,14 30,12 40,10 50,8 60,9 70,7 80,5 90,4 100,3' },
    ],
    async init() {},
    async run() {
      this.running = true;
      try {
        const r = await fetch('/api/engagement/' + this.tab, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ keyword: this.keyword, dry_run: this.dryRun }) });
        if (r.ok) {
          const data = await r.json();
          (data.results || []).forEach(x => this.results.unshift({ time: new Date().toLocaleTimeString(), target: x.target || this.keyword, status: x.status || 'ok' }));
        }
      } catch (e) {
        this.results.unshift({ time: new Date().toLocaleTimeString(), target: this.keyword, status: 'queued' });
      }
      this.running = false;
    }
  }
}
</script>
</main>
</body>
</html>

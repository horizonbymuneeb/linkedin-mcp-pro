<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ban-Safety Gate · linkedin-mcp-pro</title>
  {% include "_shell.html" %}
</head>
<body x-data="safetyPanel()" x-init="init()">
<main class="pt-14 min-h-screen md:ml-[240px]">
<div class="max-w-6xl mx-auto px-6 py-8 animate-fade-in">
  <div class="rounded-2xl bg-gradient-to-br from-red-500 to-orange-500 text-white p-8 shadow-xl mb-8">
    <h1 class="text-3xl font-bold mb-2">Ban-Safety Gate</h1>
    <p class="text-orange-50">Stay within safe limits to keep your account healthy</p>
  </div>

  <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
    <template x-for="k in kpis" :key="k.label">
      <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 p-5 hover:shadow-lg transition">
        <div class="flex items-center justify-between mb-2">
          <span class="text-sm text-gray-500 dark:text-gray-400" x-text="k.label"></span>
          <span class="text-xs font-mono text-gray-400" x-text="k.value + '/' + k.limit"></span>
        </div>
        <div class="text-2xl font-bold mb-3" x-text="k.value"></div>
        <div class="w-full h-2 bg-gray-100 dark:bg-gray-800 rounded-full overflow-hidden">
          <div class="h-full rounded-full transition-all" :class="k.pct > 80 ? 'bg-red-500' : k.pct > 50 ? 'bg-amber-500' : 'bg-emerald-500'" :style="'width:' + k.pct + '%'"></div>
        </div>
      </div>
    </template>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
    <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 p-6">
      <h3 class="text-lg font-semibold mb-4">Business Hours</h3>
      <div class="flex items-center gap-3 mb-4">
        <div class="w-3 h-3 rounded-full" :class="insideHours ? 'bg-emerald-500 animate-pulse' : 'bg-red-500'"></div>
        <span class="font-medium" :class="insideHours ? 'text-emerald-600 dark:text-emerald-400' : 'text-red-600 dark:text-red-400'" x-text="insideHours ? '✓ Inside hours' : '✕ Outside hours'"></span>
      </div>
      <div class="space-y-2 text-sm">
        <div class="flex justify-between"><span class="text-gray-500">Window</span><span class="font-mono" x-text="hours.start + ':00 – ' + hours.end + ':00'"></span></div>
        <div class="flex justify-between"><span class="text-gray-500">Days</span><span x-text="hours.days"></span></div>
        <div class="flex justify-between"><span class="text-gray-500">Timezone</span><span x-text="hours.tz"></span></div>
      </div>
    </div>

    <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 p-6">
      <h3 class="text-lg font-semibold mb-4">Test Gate</h3>
      <input type="text" x-model="testInput" placeholder="Try an action: 'like AI startups'" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-700 rounded-lg bg-white dark:bg-gray-800 mb-3 focus:ring-2 focus:ring-li-blue focus:border-transparent">
      <button @click="testGate()" class="w-full px-4 py-2 bg-li-blue hover:bg-li-blue-dark text-white rounded-lg font-medium transition">Test gate</button>
      <div x-show="testResult" x-cloak class="mt-3 p-3 rounded-lg" :class="testResult?.allow ? 'bg-emerald-50 dark:bg-emerald-900/20 text-emerald-700 dark:text-emerald-300' : 'bg-red-50 dark:bg-red-900/20 text-red-700 dark:text-red-300'">
        <span class="font-medium" x-text="testResult?.allow ? '✓ ALLOWED' : '✕ BLOCKED'"></span>
        <span class="text-sm ml-2" x-text="testResult?.reason"></span>
      </div>
    </div>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
    <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 p-6">
      <h3 class="text-lg font-semibold mb-1">Whitelist</h3>
      <p class="text-sm text-gray-500 mb-4">Only act on content matching these keywords</p>
      <div class="flex flex-wrap gap-2 mb-3">
        <template x-for="(w, i) in whitelist" :key="i">
          <span class="inline-flex items-center gap-1 px-3 py-1 bg-emerald-100 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-300 rounded-full text-sm">
            <span x-text="w"></span>
            <button @click="whitelist.splice(i, 1)" class="hover:text-emerald-900 dark:hover:text-emerald-100">×</button>
          </span>
        </template>
      </div>
      <input type="text" @keydown.enter="addWhitelist($event)" placeholder="Type keyword + Enter" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-700 rounded-lg bg-white dark:bg-gray-800 focus:ring-2 focus:ring-li-blue focus:border-transparent">
    </div>

    <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 p-6">
      <h3 class="text-lg font-semibold mb-1">Blacklist</h3>
      <p class="text-sm text-gray-500 mb-4">Never act on content matching these keywords</p>
      <div class="flex flex-wrap gap-2 mb-3">
        <template x-for="(b, i) in blacklist" :key="i">
          <span class="inline-flex items-center gap-1 px-3 py-1 bg-red-100 dark:bg-red-900/30 text-red-700 dark:text-red-300 rounded-full text-sm">
            <span x-text="b"></span>
            <button @click="blacklist.splice(i, 1)" class="hover:text-red-900 dark:hover:text-red-100">×</button>
          </span>
        </template>
      </div>
      <input type="text" @keydown.enter="addBlacklist($event)" placeholder="Type keyword + Enter" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-700 rounded-lg bg-white dark:bg-gray-800 focus:ring-2 focus:ring-li-blue focus:border-transparent">
    </div>
  </div>
</div>
</div>

<script>
function safetyPanel() {
  return {
    dark: document.documentElement.classList.contains('dark'),
    kpis: [
      { label: 'Likes today', value: 12, limit: 50, pct: 24 },
      { label: 'Comments today', value: 5, limit: 20, pct: 25 },
      { label: 'Connects today', value: 8, limit: 25, pct: 32 },
      { label: 'Posts today', value: 1, limit: 3, pct: 33 },
    ],
    hours: { start: 9, end: 18, days: 'Mon–Fri', tz: 'UTC' },
    insideHours: true,
    whitelist: ['AI', 'startups', 'machine learning'],
    blacklist: ['crypto', 'NFT', 'MLM'],
    testInput: '',
    testResult: null,
    async init() {
      try { const r = await fetch('/api/safety/status'); if (r.ok) Object.assign(this, await r.json()); } catch (e) {}
    },
    addWhitelist(e) { const v = e.target.value.trim(); if (v) { this.whitelist.push(v); e.target.value = ''; } },
    addBlacklist(e) { const v = e.target.value.trim(); if (v) { this.blacklist.push(v); e.target.value = ''; } },
    async testGate() {
      try {
        const r = await fetch('/api/safety/test', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ input: this.testInput }) });
        if (r.ok) this.testResult = await r.json();
        else this.testResult = { allow: !this.blacklist.some(b => this.testInput.toLowerCase().includes(b.toLowerCase())), reason: 'Local check' };
      } catch (e) { this.testResult = { allow: true, reason: 'Local fallback' }; }
    }
  }
}
</script>
</div>
</main>
</body>
</html>

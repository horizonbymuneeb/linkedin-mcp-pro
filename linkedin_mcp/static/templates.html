<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Templates · linkedin-mcp-pro</title>
  {% include "_shell.html" %}
</head>
<body>
<main class="ml-[240px] pt-14 min-h-screen">
    <div class="max-w-6xl mx-auto px-6 py-8">




  <div class="rounded-2xl bg-gradient-to-br from-amber-500 to-orange-600 text-white p-8 shadow-xl mb-8 flex items-center justify-between">
    <div>
      <h1 class="text-3xl font-bold mb-2">Templates</h1>
      <p class="text-amber-50">Reusable post structures for every occasion</p>
    </div>
    <button @click="showModal = true" class="px-4 py-2 bg-white/20 hover:bg-white/30 backdrop-blur rounded-lg font-medium transition">+ New template</button>
  </div>

  <div class="mb-6">
    <input type="text" x-model="query" placeholder="Search templates…" class="w-full max-w-md px-4 py-2 border border-gray-300 dark:border-gray-700 rounded-lg bg-white dark:bg-gray-800 focus:ring-2 focus:ring-li-blue focus:border-transparent">
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
    <template x-for="t in filtered" :key="t.id">
      <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 p-5 hover:shadow-lg hover:-translate-y-0.5 transition">
        <div class="flex items-start justify-between mb-2">
          <h3 class="font-semibold text-lg" x-text="t.name"></h3>
          <span class="text-xs text-gray-400 font-mono" x-text="'v' + (t.version || 1)"></span>
        </div>
        <p class="text-sm text-gray-600 dark:text-gray-400 mb-3 line-clamp-3" x-text="t.body"></p>
        <div class="flex flex-wrap gap-1 mb-4">
          <template x-for="tag in (t.tags || [])" :key="tag">
            <span :class="tagColor(tag)" class="px-2 py-0.5 text-xs font-medium rounded-full" x-text="tag"></span>
          </template>
        </div>
        <div class="flex gap-2">
          <button class="flex-1 px-3 py-1.5 text-sm bg-li-blue hover:bg-li-blue-dark text-white rounded-md transition">Use</button>
          <button class="flex-1 px-3 py-1.5 text-sm bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 rounded-md transition">Edit</button>
          <button @click="remove(t)" class="px-3 py-1.5 text-sm bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 hover:bg-red-100 dark:hover:bg-red-900/30 rounded-md transition">Delete</button>
        </div>
      </div>
    </template>
  </div>

  <div x-show="filtered.length === 0" class="text-center py-12 text-gray-500 dark:text-gray-400">No templates match your search</div>

  <div x-show="showModal" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm" @click.self="showModal = false">
    <div class="bg-white dark:bg-gray-900 rounded-2xl shadow-2xl max-w-md w-full p-6">
      <h2 class="text-xl font-bold mb-4">New template</h2>
      <form @submit.prevent="create()" class="space-y-3">
        <input type="text" x-model="form.name" placeholder="Template name" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-700 rounded-lg bg-white dark:bg-gray-800" required>
        <textarea x-model="form.body" placeholder="Template body (use {{placeholders}})" rows="5" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-700 rounded-lg bg-white dark:bg-gray-800" required></textarea>
        <input type="text" x-model="form.tags" placeholder="comma,separated,tags" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-700 rounded-lg bg-white dark:bg-gray-800">
        <div class="flex gap-2 pt-2">
          <button type="button" @click="showModal = false" class="flex-1 px-4 py-2 bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 rounded-lg font-medium transition">Cancel</button>
          <button type="submit" class="flex-1 px-4 py-2 bg-li-blue hover:bg-li-blue-dark text-white rounded-lg font-medium transition">Create</button>
        </div>
      </form>
    </div>
  </div>
  </div>


<script>
function templatesPanel() {
  return {
    dark: document.documentElement.classList.contains('dark'),
    showModal: false,
    query: '',
    templates: [],
    form: { name: '', body: '', tags: '' },
    get filtered() {
      const q = this.query.toLowerCase();
      if (!q) return this.templates;
      return this.templates.filter(t => t.name.toLowerCase().includes(q) || (t.body || '').toLowerCase().includes(q) || (t.tags || []).join(' ').toLowerCase().includes(q));
    },
    tagColor(tag) {
      const colors = ['bg-blue-100 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300', 'bg-emerald-100 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-300', 'bg-purple-100 dark:bg-purple-900/30 text-purple-700 dark:text-purple-300', 'bg-amber-100 dark:bg-amber-900/30 text-amber-700 dark:text-amber-300', 'bg-pink-100 dark:bg-pink-900/30 text-pink-700 dark:text-pink-300'];
      let h = 0; for (let i = 0; i < tag.length; i++) h = (h * 31 + tag.charCodeAt(i)) & 0xffff;
      return colors[h % colors.length];
    },
    async init() { await this.load(); },
    async load() {
      try { const r = await fetch('/api/templates'); if (r.ok) this.templates = await r.json(); else this.templates = this._seed(); } catch (e) { this.templates = this._seed(); }
    },
    _seed() {
      return [
        { id: 1, name: 'Morning Tip', body: 'Here is a quick tip I learned this week about {{topic}}…\n\n#productivity #growth', tags: ['tip', 'short'], version: 1 },
        { id: 2, name: 'Weekly Recap', body: 'This week I shipped {{thing1}} and {{thing2}}. Here are the lessons…', tags: ['recap', 'weekly'], version: 1 },
        { id: 3, name: 'Industry News', body: 'Interesting development in {{industry}}: {{headline}}. What do you think?', tags: ['news', 'discussion'], version: 1 },
        { id: 4, name: 'Hiring Post', body: 'We are hiring a {{role}} at {{company}}! If you love {{thing}}, DM me.', tags: ['hiring'], version: 1 },
      ];
    },
    async create() {
      const payload = { ...this.form, tags: this.form.tags.split(',').map(s => s.trim()).filter(Boolean) };
      try { const r = await fetch('/api/templates', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) }); if (r.ok) { await this.load(); this.showModal = false; this.form = { name: '', body: '', tags: '' }; } } catch (e) {}
    },
    async remove(t) { if (!confirm('Delete this template?')) return; try { await fetch('/api/templates/' + t.id, { method: 'DELETE' }); await this.load(); } catch (e) {} }
  }
}
</script>
</main>
</body>
</html>

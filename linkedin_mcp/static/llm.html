<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM API Keys · linkedin-mcp-pro</title>
  {% include "_shell.html" %}
</head>
<body>
<main class="ml-[240px] pt-14 min-h-screen">
    <div class="max-w-6xl mx-auto px-6 py-8">




  <div class="rounded-2xl bg-gradient-to-br from-li-blue to-li-blue-dark text-white p-8 shadow-xl mb-8">
    <div class="flex items-center justify-between">
      <div>
        <h1 class="text-3xl font-bold mb-2">LLM API Keys</h1>
        <p class="text-blue-100">Configure providers for intelligent features</p>
      </div>
      <button @click="showModal = true" class="px-4 py-2 bg-white/20 hover:bg-white/30 backdrop-blur rounded-lg font-medium transition">+ Add provider</button>
    </div>
  </div>

  <div x-show="providers.length === 0" class="text-center py-16 bg-white dark:bg-gray-900 rounded-2xl border border-dashed border-gray-300 dark:border-gray-700">
    <div class="w-16 h-16 mx-auto mb-4 rounded-full bg-li-blue-light dark:bg-gray-800 flex items-center justify-center">
      <svg class="w-8 h-8 text-li-blue" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/></svg>
    </div>
    <h3 class="text-lg font-semibold mb-2">No providers yet</h3>
    <p class="text-gray-500 dark:text-gray-400 mb-4">Let's add your first provider to enable AI features</p>
    <button @click="showModal = true" class="px-4 py-2 bg-li-blue hover:bg-li-blue-dark text-white rounded-lg font-medium transition">+ Add your first provider</button>
  </div>

  <div x-show="providers.length > 0" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
    <template x-for="p in providers" :key="p.name">
      <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 p-5 hover:shadow-lg hover:-translate-y-0.5 transition">
        <div class="flex items-start justify-between mb-3">
          <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-li-blue to-li-blue-dark flex items-center justify-center text-white font-bold" x-text="p.name[0]"></div>
          <span x-show="p.configured" class="px-2 py-0.5 text-xs font-medium bg-emerald-100 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-300 rounded-full">✓ Configured</span>
          <span x-show="!p.configured" class="px-2 py-0.5 text-xs font-medium bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400 rounded-full">Not set</span>
        </div>
        <h3 class="font-semibold text-lg mb-1" x-text="p.name"></h3>
        <p class="text-xs text-gray-500 dark:text-gray-400 font-mono mb-2" x-text="'••••••••' + (p.key || '0000')"></p>
        <p class="text-sm text-gray-600 dark:text-gray-400 truncate mb-1"><span class="font-medium">URL:</span> <span x-text="p.base_url || 'default'"></span></p>
        <p class="text-sm text-gray-600 dark:text-gray-400 mb-4"><span class="font-medium">Model:</span> <span x-text="p.model || '—'"></span></p>
        <div class="flex gap-2">
          <button class="flex-1 px-3 py-1.5 text-sm bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 rounded-md transition">Test</button>
          <button class="px-3 py-1.5 text-sm bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 hover:bg-red-100 dark:hover:bg-red-900/30 rounded-md transition">Remove</button>
        </div>
      </div>
    </template>
  </div>

  <div x-show="showModal" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm" @click.self="showModal = false">
    <div class="bg-white dark:bg-gray-900 rounded-2xl shadow-2xl max-w-md w-full p-6 animate-slide-up">
      <h2 class="text-xl font-bold mb-4">Add provider</h2>
      <form @submit.prevent="saveProvider()" class="space-y-4">
        <div>
          <label class="block text-sm font-medium mb-1">Provider</label>
          <select x-model="form.name" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-700 rounded-lg bg-white dark:bg-gray-800 focus:ring-2 focus:ring-li-blue focus:border-transparent">
            <option value="openai">OpenAI</option>
            <option value="anthropic">Anthropic</option>
            <option value="google">Google</option>
            <option value="mistral">Mistral</option>
            <option value="groq">Groq</option>
            <option value="ollama">Ollama (local)</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">API key</label>
          <input type="password" x-model="form.key" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-700 rounded-lg bg-white dark:bg-gray-800 focus:ring-2 focus:ring-li-blue focus:border-transparent" placeholder="sk-...">
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Base URL <span class="text-gray-400">(optional)</span></label>
          <input type="text" x-model="form.base_url" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-700 rounded-lg bg-white dark:bg-gray-800 focus:ring-2 focus:ring-li-blue focus:border-transparent" placeholder="https://api.openai.com/v1">
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Model</label>
          <input type="text" x-model="form.model" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-700 rounded-lg bg-white dark:bg-gray-800 focus:ring-2 focus:ring-li-blue focus:border-transparent" placeholder="gpt-4o-mini">
        </div>
        <div class="flex gap-2 pt-2">
          <button type="button" @click="showModal = false" class="flex-1 px-4 py-2 bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 rounded-lg font-medium transition">Cancel</button>
          <button type="submit" class="flex-1 px-4 py-2 bg-li-blue hover:bg-li-blue-dark text-white rounded-lg font-medium transition">Save & Test</button>
        </div>
      </form>
    </div>
  </div>
  </div>


<script>
function llmPanel() {
  return {
    dark: document.documentElement.classList.contains('dark'),
    showModal: false,
    providers: [],
    form: { name: 'openai', key: '', base_url: '', model: '' },
    async init() {
      try {
        const r = await fetch('/api/llm/providers');
        if (r.ok) this.providers = await r.json();
      } catch (e) { this.providers = []; }
    },
    async saveProvider() {
      try {
        const r = await fetch('/api/llm/providers', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(this.form) });
        if (r.ok) { await this.init(); this.showModal = false; this.form = { name: 'openai', key: '', base_url: '', model: '' }; }
      } catch (e) { console.error(e); }
    }
  }
}
</script>
</main>
</body>
</html>

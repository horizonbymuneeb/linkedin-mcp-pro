<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audit Log · linkedin-mcp-pro</title>
  {% include "_shell.html" %}
</head>
<body>
<main class="ml-[240px] pt-14 min-h-screen">
    <div class="max-w-6xl mx-auto px-6 py-8">




  <div class="rounded-2xl bg-gradient-to-br from-slate-700 to-slate-900 text-white p-8 shadow-xl mb-8 flex items-center justify-between">
    <div>
      <h1 class="text-3xl font-bold mb-2">Audit Log</h1>
      <p class="text-slate-300">Complete record of every action</p>
    </div>
    <div class="flex items-center gap-2">
      <span class="relative flex h-3 w-3">
        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
        <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
      </span>
      <span class="text-sm font-medium text-emerald-300">Live</span>
    </div>
  </div>

  <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 p-4 mb-6">
    <div class="grid grid-cols-1 md:grid-cols-5 gap-3">
      <select x-model="filters.action" class="px-3 py-2 border border-gray-300 dark:border-gray-700 rounded-lg bg-white dark:bg-gray-800 text-sm">
        <option value="">All actions</option><option>post.create</option><option>post.like</option><option>post.comment</option><option>connect.send</option><option>profile.view</option>
      </select>
      <select x-model="filters.status" class="px-3 py-2 border border-gray-300 dark:border-gray-700 rounded-lg bg-white dark:bg-gray-800 text-sm">
        <option value="">All status</option><option value="ok">OK</option><option value="error">Error</option><option value="blocked">Blocked</option>
      </select>
      <input type="date" x-model="filters.from" class="px-3 py-2 border border-gray-300 dark:border-gray-700 rounded-lg bg-white dark:bg-gray-800 text-sm">
      <input type="date" x-model="filters.to" class="px-3 py-2 border border-gray-300 dark:border-gray-700 rounded-lg bg-white dark:bg-gray-800 text-sm">
      <div class="flex gap-2">
        <button @click="load()" class="flex-1 px-3 py-2 bg-li-blue hover:bg-li-blue-dark text-white rounded-lg text-sm font-medium transition">Apply</button>
        <button @click="reset()" class="flex-1 px-3 py-2 bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 rounded-lg text-sm font-medium transition">Reset</button>
      </div>
    </div>
  </div>

  <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 overflow-hidden">
    <div x-show="logs.length === 0" class="text-center py-16">
      <div class="w-12 h-12 mx-auto mb-3 rounded-full bg-gray-100 dark:bg-gray-800 flex items-center justify-center text-gray-400">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
      </div>
      <p class="text-gray-500 dark:text-gray-400">No audit entries match your filters</p>
    </div>
    <div x-show="logs.length > 0" class="overflow-x-auto max-h-[600px] overflow-y-auto">
      <table class="w-full text-sm">
        <thead class="bg-gray-50 dark:bg-gray-800/50 sticky top-0">
          <tr>
            <th class="text-left px-4 py-3 font-medium">Timestamp</th>
            <th class="text-left px-4 py-3 font-medium">Action</th>
            <th class="text-left px-4 py-3 font-medium">Target</th>
            <th class="text-left px-4 py-3 font-medium">Status</th>
            <th class="text-left px-4 py-3 font-medium">Details</th>
          </tr>
        </thead>
        <tbody>
          <template x-for="(l, i) in logs.slice(0, 50)" :key="i">
            <tr class="border-t border-gray-200 dark:border-gray-800 hover:bg-gray-50 dark:hover:bg-gray-800/30 transition">
              <td class="px-4 py-3 font-mono text-xs whitespace-nowrap" x-text="l.ts"></td>
              <td class="px-4 py-3 font-mono text-xs" x-text="l.action"></td>
              <td class="px-4 py-3 truncate max-w-xs" x-text="l.target"></td>
              <td class="px-4 py-3"><span :class="statusClass(l.status)" x-text="l.status"></span></td>
              <td class="px-4 py-3 text-gray-500 dark:text-gray-400 text-xs truncate max-w-xs" x-text="l.details || '—'"></td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>
  </div>
  </div>


<script>
function auditPanel() {
  return {
    dark: document.documentElement.classList.contains('dark'),
    filters: { action: '', status: '', from: '', to: '' },
    logs: [],
    statusClass(s) { return s === 'ok' ? 'text-emerald-600 dark:text-emerald-400 font-medium' : s === 'error' ? 'text-red-600 dark:text-red-400 font-medium' : 'text-amber-600 dark:text-amber-400 font-medium'; },
    async init() { await this.load(); },
    async load() {
      try {
        const qs = new URLSearchParams(Object.entries(this.filters).filter(([_, v]) => v));
        const r = await fetch('/api/audit?' + qs.toString());
        if (r.ok) this.logs = await r.json();
        else this.logs = [];
      } catch (e) { this.logs = []; }
    },
    reset() { this.filters = { action: '', status: '', from: '', to: '' }; this.load(); }
  }
}
</script>
</main>
</body>
</html>

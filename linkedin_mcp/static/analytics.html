<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics · linkedin-mcp-pro</title>
  {% include "_shell.html" %}
</head>
<body>
<main class="ml-[240px] pt-14 min-h-screen">
    <div class="max-w-6xl mx-auto px-6 py-8">




  <div class="rounded-2xl bg-gradient-to-br from-cyan-500 to-blue-600 text-white p-8 shadow-xl mb-8">
    <div class="flex items-center justify-between">
      <div>
        <h1 class="text-3xl font-bold mb-2">Analytics</h1>
        <p class="text-cyan-50">Track performance and engagement trends</p>
      </div>
      <div class="flex bg-white/20 backdrop-blur rounded-lg p-1">
        <template x-for="d in [7, 30, 90]" :key="d">
          <button @click="days = d" :class="days === d ? 'bg-white text-cyan-700' : 'text-white hover:bg-white/10'" class="px-3 py-1.5 text-sm font-medium rounded-md transition" x-text="d + 'd'"></button>
        </template>
      </div>
    </div>
  </div>

  <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
    <template x-for="k in kpis" :key="k.label">
      <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 p-5 hover:shadow-lg hover:scale-105 transition cursor-default">
        <div class="text-sm text-gray-500 dark:text-gray-400 mb-1" x-text="k.label"></div>
        <div class="text-2xl font-bold mb-1" x-text="k.value"></div>
        <div :class="k.delta > 0 ? 'text-emerald-600 dark:text-emerald-400' : 'text-red-600 dark:text-red-400'" class="text-xs font-medium" x-text="(k.delta > 0 ? '↑ +' : '↓ ') + k.delta + '%'"></div>
      </div>
    </template>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
    <div class="lg:col-span-2 bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 p-6">
      <h3 class="text-lg font-semibold mb-4">Engagement over time</h3>
      <div class="h-64"><canvas id="engagementChart"></canvas></div>
    </div>
    <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 p-6">
      <h3 class="text-lg font-semibold mb-4">Top posts</h3>
      <div class="space-y-3">
        <template x-for="(p, i) in topPosts" :key="i">
          <div class="flex items-start gap-3">
            <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-li-blue to-li-blue-dark text-white flex items-center justify-center text-xs font-bold" x-text="i+1"></div>
            <div class="flex-1 min-w-0">
              <p class="text-sm font-medium truncate" x-text="p.title"></p>
              <p class="text-xs text-gray-500" x-text="p.metrics"></p>
            </div>
          </div>
        </template>
      </div>
    </div>
  </div>

  <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 p-6">
    <h3 class="text-lg font-semibold mb-4">Hour-of-day heatmap</h3>
    <div class="grid grid-cols-12 gap-1">
      <template x-for="h in 24" :key="h">
        <div class="aspect-square rounded text-xs flex items-center justify-center font-mono" :class="heatColor(hourValue(h-1))" :title="(h-1) + ':00 — ' + hourValue(h-1) + ' actions'" x-text="(h-1).toString().padStart(2,'0')"></div>
      </template>
    </div>
    <div class="flex items-center gap-2 mt-4 text-xs text-gray-500">
      <span>Less</span>
      <div class="w-4 h-4 rounded bg-cyan-100 dark:bg-cyan-900/30"></div>
      <div class="w-4 h-4 rounded bg-cyan-300 dark:bg-cyan-700"></div>
      <div class="w-4 h-4 rounded bg-cyan-500"></div>
      <div class="w-4 h-4 rounded bg-cyan-700"></div>
      <span>More</span>
    </div>
  </div>
  </div>


<script>
function analyticsPanel() {
  return {
    dark: document.documentElement.classList.contains('dark'),
    days: 30,
    kpis: [
      { label: 'Impressions', value: '12.4K', delta: 18 },
      { label: 'Engagements', value: '892', delta: 24 },
      { label: 'New followers', value: '147', delta: 12 },
      { label: 'Post views', value: '4.2K', delta: -3 },
    ],
    topPosts: [
      { title: 'How we scaled to 10K users', metrics: '234 reactions · 47 comments' },
      { title: '3 lessons from a failed launch', metrics: '189 reactions · 32 comments' },
      { title: 'My morning routine for deep work', metrics: '156 reactions · 28 comments' },
    ],
    chart: null,
    heatData: Array.from({ length: 24 }, (_, h) => Math.round(5 + 30 * Math.exp(-Math.pow((h - 14) / 4, 2)) + Math.random() * 5)),
    hourValue(h) { return this.heatData[h] || 0; },
    heatColor(v) {
      if (v < 10) return 'bg-cyan-100 dark:bg-cyan-900/30 text-cyan-900 dark:text-cyan-100';
      if (v < 18) return 'bg-cyan-300 dark:bg-cyan-700 text-cyan-900 dark:text-white';
      if (v < 26) return 'bg-cyan-500 text-white';
      return 'bg-cyan-700 text-white';
    },
    async init() { await this.load(); },
    async load() {
      try {
        const r = await fetch('/api/summary?days=' + this.days);
        if (r.ok) {
          const d = await r.json();
          if (d.kpis) this.kpis = d.kpis;
        }
      } catch (e) {}
      this.renderChart();
    },
    renderChart() {
      const ctx = document.getElementById('engagementChart');
      if (!ctx) return;
      if (this.chart) this.chart.destroy();
      const labels = Array.from({ length: this.days }, (_, i) => 'D' + (i + 1));
      const data = Array.from({ length: this.days }, () => Math.round(20 + Math.random() * 80));
      this.chart = new Chart(ctx, {
        type: 'bar',
        data: { labels, datasets: [{ label: 'Engagements', data, backgroundColor: '#0a66c2', borderRadius: 4 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false } }, y: { beginAtZero: true } } }
      });
    }
  }
}
</script>
</main>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile · linkedin-mcp-pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: { 'li-blue': '#0a66c2', 'li-blue-dark': '#004182' },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          animation: { 'fade-in': 'fadeIn 0.3s ease-in-out' },
          keyframes: { fadeIn: { '0%': { opacity: 0 }, '100%': { opacity: 1 } } },
        },
      },
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
  <style>[x-cloak] { display: none !important; } body { font-family: 'Inter', system-ui, sans-serif; }</style>
  <script>
    (function() {
      const saved = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (saved === 'dark' || (!saved && prefersDark)) document.documentElement.classList.add('dark');
    })();
  </script>
</head>
<body x-data="profilePanel()" x-init="init()" class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 min-h-screen">

<nav class="sticky top-0 z-50 bg-white/80 dark:bg-gray-900/80 backdrop-blur-md border-b border-gray-200 dark:border-gray-800">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">
      <a href="/" class="flex items-center gap-2">
        <div class="w-8 h-8 bg-gradient-to-br from-li-blue to-li-blue-dark rounded-lg flex items-center justify-center">
          <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M20.5 2h-17A1.5 1.5 0 002 3.5v17A1.5 1.5 0 003.5 22h17a1.5 1.5 0 001.5-1.5v-17A1.5 1.5 0 0020.5 2zM8 19H5v-9h3zM6.5 8.25A1.75 1.75 0 118.3 6.5a1.78 1.78 0 01-1.8 1.75zM19 19h-3v-4.74c0-1.42-.6-1.93-1.38-1.93A1.74 1.74 0 0013 14.19a.66.66 0 000 .14V19h-3v-9h2.9v1.3a3.11 3.11 0 012.7-1.4c1.55 0 3.36.86 3.36 3.66z"/></svg>
        </div>
        <span class="text-lg font-bold bg-gradient-to-r from-li-blue to-li-blue-dark bg-clip-text text-transparent">linkedin-mcp-pro</span>
      </a>
      <button @click="dark = !dark" class="p-2 rounded-md hover:bg-gray-100 dark:hover:bg-gray-800 transition">
        <svg x-show="!dark" class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/></svg>
        <svg x-show="dark" x-cloak class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" clip-rule="evenodd"/></svg>
      </button>
    </div>
  </div>
</nav>

<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 animate-fade-in">
  <div class="rounded-2xl bg-gradient-to-br from-li-blue to-li-blue-dark text-white p-8 shadow-xl mb-8 relative overflow-hidden">
    <div class="absolute top-0 right-0 w-64 h-64 bg-white/5 rounded-full -translate-y-1/2 translate-x-1/2"></div>
    <div class="relative flex items-start gap-6">
      <div class="w-24 h-24 rounded-full bg-white/20 backdrop-blur flex items-center justify-center text-3xl font-bold border-4 border-white/30" x-text="(profile.name || '?').split(' ').map(s => s[0]).join('').slice(0,2)"></div>
      <div class="flex-1">
        <h1 class="text-3xl font-bold mb-1" x-text="profile.name"></h1>
        <p class="text-blue-100 mb-1" x-text="profile.headline"></p>
        <p class="text-blue-200 text-sm" x-text="profile.location"></p>
        <p x-show="profile.current_position" class="text-blue-100 text-sm mt-2">Currently: <span class="font-medium" x-text="profile.current_position"></span></p>
      </div>
    </div>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
    <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 p-6">
      <div class="flex items-center justify-between mb-2">
        <h3 class="font-semibold">Cookie health</h3>
        <span :class="cookieHealth.ok ? 'text-emerald-500' : 'text-red-500'" class="text-2xl" x-text="cookieHealth.ok ? '✓' : '✗'"></span>
      </div>
      <p class="text-sm text-gray-500 dark:text-gray-400" x-text="cookieHealth.ok ? 'Session valid — ready to post' : 'Session expired — re-authenticate'"></p>
      <div x-show="!cookieHealth.ok" class="mt-3">
        <a href="/static/cookies.html" class="text-sm text-li-blue hover:underline font-medium">Re-authenticate →</a>
      </div>
    </div>

    <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 p-6">
      <h3 class="font-semibold mb-3">Account stats</h3>
      <div class="space-y-2 text-sm">
        <div class="flex justify-between"><span class="text-gray-500">Account age</span><span class="font-mono" x-text="profile.account_age || '—'"></span></div>
        <div class="flex justify-between"><span class="text-gray-500">Posts</span><span class="font-mono" x-text="profile.posts || 0"></span></div>
        <div class="flex justify-between"><span class="text-gray-500">Connections</span><span class="font-mono" x-text="profile.connections || 0"></span></div>
      </div>
    </div>

    <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 p-6">
      <h3 class="font-semibold mb-3">Multi-account</h3>
      <div x-show="accounts.length === 0" class="text-sm text-gray-500">Only one account configured</div>
      <div x-show="accounts.length > 0" class="space-y-2">
        <template x-for="a in accounts" :key="a.id">
          <button @click="switchTo(a)" :class="a.active ? 'border-li-blue bg-li-blue-light dark:bg-li-blue-dark/20' : 'border-gray-200 dark:border-gray-700 hover:border-gray-300 dark:hover:border-gray-600'" class="w-full text-left px-3 py-2 border rounded-lg transition">
            <div class="text-sm font-medium" x-text="a.name"></div>
            <div class="text-xs text-gray-500" x-text="a.email"></div>
          </button>
        </template>
      </div>
    </div>
  </div>

  <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 p-6">
    <h3 class="text-lg font-semibold mb-4">Recent activity</h3>
    <div class="space-y-3">
      <template x-for="(a, i) in activity" :key="i">
        <div class="flex items-center gap-3 text-sm">
          <div class="w-2 h-2 rounded-full" :class="a.dot"></div>
          <span class="text-gray-600 dark:text-gray-400" x-text="a.text"></span>
          <span class="ml-auto text-xs text-gray-400" x-text="a.time"></span>
        </div>
      </template>
    </div>
  </div>
</main>

<script>
function profilePanel() {
  return {
    dark: document.documentElement.classList.contains('dark'),
    profile: { name: 'Your Name', headline: 'Building things on the internet', location: 'San Francisco, CA', current_position: 'Software Engineer', account_age: '4 years', posts: 142, connections: 1847 },
    cookieHealth: { ok: true },
    accounts: [],
    activity: [
      { dot: 'bg-emerald-500', text: 'Posted a status update', time: '2h ago' },
      { dot: 'bg-blue-500', text: 'Sent 5 connection requests', time: '5h ago' },
      { dot: 'bg-purple-500', text: 'Drafted a new post', time: '1d ago' },
    ],
    async init() {
      try { const r = await fetch('/api/profile'); if (r.ok) Object.assign(this.profile, await r.json()); } catch (e) {}
      try { const r = await fetch('/api/accounts'); if (r.ok) this.accounts = await r.json(); } catch (e) {}
      try { const r = await fetch('/api/cookies/health'); if (r.ok) this.cookieHealth = await r.json(); } catch (e) {}
    },
    async switchTo(a) {
      try { await fetch('/api/accounts/' + a.id + '/activate', { method: 'POST' }); location.reload(); } catch (e) {}
    }
  }
}
</script>
</body>
</html>

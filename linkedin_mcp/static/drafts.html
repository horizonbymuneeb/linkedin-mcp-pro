<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Draft a Post · linkedin-mcp-pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: { 'li-blue': '#0a66c2', 'li-blue-dark': '#004182' },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          animation: { 'fade-in': 'fadeIn 0.3s ease-in-out' },
          keyframes: { fadeIn: { '0%': { opacity: 0 }, '100%': { opacity: 1 } } },
        },
      },
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
  <style>[x-cloak] { display: none !important; } body { font-family: 'Inter', system-ui, sans-serif; }</style>
  <script>
    (function() {
      const saved = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (saved === 'dark' || (!saved && prefersDark)) document.documentElement.classList.add('dark');
    })();
  </script>
</head>
<body x-data="draftsPanel()" x-init="init()" class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 min-h-screen">

<nav class="sticky top-0 z-50 bg-white/80 dark:bg-gray-900/80 backdrop-blur-md border-b border-gray-200 dark:border-gray-800">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">
      <a href="/" class="flex items-center gap-2">
        <div class="w-8 h-8 bg-gradient-to-br from-li-blue to-li-blue-dark rounded-lg flex items-center justify-center">
          <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M20.5 2h-17A1.5 1.5 0 002 3.5v17A1.5 1.5 0 003.5 22h17a1.5 1.5 0 001.5-1.5v-17A1.5 1.5 0 0020.5 2zM8 19H5v-9h3zM6.5 8.25A1.75 1.75 0 118.3 6.5a1.78 1.78 0 01-1.8 1.75zM19 19h-3v-4.74c0-1.42-.6-1.93-1.38-1.93A1.74 1.74 0 0013 14.19a.66.66 0 000 .14V19h-3v-9h2.9v1.3a3.11 3.11 0 012.7-1.4c1.55 0 3.36.86 3.36 3.66z"/></svg>
        </div>
        <span class="text-lg font-bold bg-gradient-to-r from-li-blue to-li-blue-dark bg-clip-text text-transparent">linkedin-mcp-pro</span>
      </a>
      <button @click="dark = !dark" class="p-2 rounded-md hover:bg-gray-100 dark:hover:bg-gray-800 transition">
        <svg x-show="!dark" class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/></svg>
        <svg x-show="dark" x-cloak class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" clip-rule="evenodd"/></svg>
      </button>
    </div>
  </div>
</nav>

<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 animate-fade-in">
  <div class="rounded-2xl bg-gradient-to-br from-li-blue to-li-blue-dark text-white p-8 shadow-xl mb-8">
    <h1 class="text-3xl font-bold mb-2">Draft a Post</h1>
    <p class="text-blue-100">Generate, edit, and publish — all in one place</p>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
    <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 p-6">
      <h3 class="text-lg font-semibold mb-4">Generate</h3>
      <form @submit.prevent="draft()" class="space-y-4">
        <div>
          <label class="block text-sm font-medium mb-1">Topic</label>
          <input type="text" x-model="form.topic" placeholder="e.g. building a startup in 2026" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-700 rounded-lg bg-white dark:bg-gray-800 focus:ring-2 focus:ring-li-blue focus:border-transparent" required>
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Tone</label>
          <select x-model="form.tone" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-700 rounded-lg bg-white dark:bg-gray-800 focus:ring-2 focus:ring-li-blue focus:border-transparent">
            <option>professional</option><option>casual</option><option>witty</option><option>inspiring</option><option>technical</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Length: <span class="font-mono text-li-blue" x-text="form.length + ' words'"></span></label>
          <input type="range" x-model.number="form.length" min="50" max="500" step="25" class="w-full">
        </div>
        <label class="flex items-center gap-2 text-sm">
          <input type="checkbox" x-model="form.hashtags" class="rounded">
          <span>Include hashtags</span>
        </label>
        <button type="submit" :disabled="loading" class="w-full px-4 py-2.5 bg-li-blue hover:bg-li-blue-dark disabled:opacity-50 text-white rounded-lg font-medium transition flex items-center justify-center gap-2">
          <svg x-show="loading" class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
          <span x-text="loading ? 'Drafting…' : 'Draft'"></span>
        </button>
      </form>
    </div>

    <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 p-6">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-lg font-semibold">Preview</h3>
        <span class="text-sm font-mono" :class="output.length > 3000 ? 'text-red-600' : 'text-gray-500'" x-text="output.length + ' / 3000'"></span>
      </div>
      <textarea x-model="output" rows="12" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-700 rounded-lg bg-white dark:bg-gray-800 focus:ring-2 focus:ring-li-blue focus:border-transparent font-sans" placeholder="Your draft will appear here…"></textarea>
      <div class="flex gap-2 mt-4">
        <button @click="save()" class="flex-1 px-4 py-2 bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 rounded-lg font-medium transition">Save draft</button>
        <button @click="post()" class="flex-1 px-4 py-2 bg-li-blue hover:bg-li-blue-dark text-white rounded-lg font-medium transition">Post now</button>
      </div>
    </div>
  </div>

  <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 p-6">
    <button @click="recentOpen = !recentOpen" class="w-full flex items-center justify-between">
      <h3 class="text-lg font-semibold">Recent drafts</h3>
      <svg :class="recentOpen ? 'rotate-180' : ''" class="w-5 h-5 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
    </button>
    <div x-show="recentOpen" x-cloak class="mt-4 space-y-2">
      <template x-for="d in recent" :key="d.id">
        <div class="p-3 rounded-lg bg-gray-50 dark:bg-gray-800/50 hover:bg-gray-100 dark:hover:bg-gray-800 transition cursor-pointer" @click="output = d.body">
          <div class="flex items-center justify-between mb-1">
            <span class="text-sm font-medium" x-text="d.topic || 'Untitled'"></span>
            <span class="text-xs text-gray-500" x-text="d.ts"></span>
          </div>
          <p class="text-sm text-gray-600 dark:text-gray-400 line-clamp-2" x-text="d.body"></p>
        </div>
      </template>
      <div x-show="recent.length === 0" class="text-sm text-gray-500 dark:text-gray-400 py-2">No saved drafts yet</div>
    </div>
  </div>
</main>

<script>
function draftsPanel() {
  return {
    dark: document.documentElement.classList.contains('dark'),
    loading: false,
    recentOpen: true,
    form: { topic: '', tone: 'professional', length: 150, hashtags: true },
    output: '',
    recent: [],
    async init() { await this.loadRecent(); },
    async loadRecent() {
      try { const r = await fetch('/api/drafts'); if (r.ok) this.recent = await r.json(); } catch (e) { this.recent = []; }
    },
    async draft() {
      this.loading = true;
      try {
        const r = await fetch('/api/drafts/generate', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(this.form) });
        if (r.ok) { const d = await r.json(); this.output = d.body || ''; }
        else this.output = this._localDraft();
      } catch (e) { this.output = this._localDraft(); }
      this.loading = false;
    },
    _localDraft() {
      const tag = this.form.hashtags ? '\n\n#linkedin #growth' : '';
      return `Thoughts on ${this.form.topic} in a ${this.form.tone} tone — here are ${this.form.length} words of insight…\n\nKey points:\n• One\n• Two\n• Three${tag}`;
    },
    async save() {
      try { await fetch('/api/drafts', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ topic: this.form.topic, body: this.output }) }); await this.loadRecent(); } catch (e) {}
    },
    async post() { if (!confirm('Publish this post now?')) return; try { await fetch('/api/posts', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ body: this.output }) }); alert('Posted!'); } catch (e) {} }
  }
}
</script>
</body>
</html>

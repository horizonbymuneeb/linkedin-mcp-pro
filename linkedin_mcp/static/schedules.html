<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post Schedules · linkedin-mcp-pro</title>
  {% include "_shell.html" %}
</head>
<body>
<main class="ml-[240px] pt-14 min-h-screen">
    <div class="max-w-6xl mx-auto px-6 py-8">




  <div class="rounded-2xl bg-gradient-to-br from-emerald-500 to-teal-600 text-white p-8 shadow-xl mb-8 flex items-center justify-between">
    <div>
      <h1 class="text-3xl font-bold mb-2">Post Schedules</h1>
      <p class="text-emerald-50">Cron-driven automation for your content pipeline</p>
    </div>
    <button @click="showForm = !showForm" class="px-4 py-2 bg-white/20 hover:bg-white/30 backdrop-blur rounded-lg font-medium transition">+ New schedule</button>
  </div>

  <div x-show="showForm" x-cloak class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 p-6 mb-6">
    <h3 class="font-semibold mb-4">New schedule</h3>
    <form @submit.prevent="create()" class="grid grid-cols-1 md:grid-cols-3 gap-3">
      <input type="text" x-model="form.name" placeholder="Schedule name" class="px-3 py-2 border border-gray-300 dark:border-gray-700 rounded-lg bg-white dark:bg-gray-800" required>
      <input type="text" x-model="form.cron" placeholder="0 9 * * 1-5" class="px-3 py-2 border border-gray-300 dark:border-gray-700 rounded-lg bg-white dark:bg-gray-800 font-mono" required>
      <select x-model="form.template" class="px-3 py-2 border border-gray-300 dark:border-gray-700 rounded-lg bg-white dark:bg-gray-800"><option value="">— template —</option><option>morning-tip</option><option>weekly-recap</option><option>industry-news</option></select>
      <textarea x-model="form.body" placeholder="Post body (or leave blank to use template)" class="md:col-span-3 px-3 py-2 border border-gray-300 dark:border-gray-700 rounded-lg bg-white dark:bg-gray-800" rows="2"></textarea>
      <div class="md:col-span-3 flex gap-2">
        <button type="submit" class="px-4 py-2 bg-li-blue hover:bg-li-blue-dark text-white rounded-lg font-medium transition">Create</button>
        <button type="button" @click="showForm = false" class="px-4 py-2 bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 rounded-lg font-medium transition">Cancel</button>
      </div>
    </form>
  </div>

  <div x-show="schedules.length === 0" class="text-center py-16 bg-white dark:bg-gray-900 rounded-2xl border border-dashed border-gray-300 dark:border-gray-700">
    <div class="w-16 h-16 mx-auto mb-4 rounded-full bg-emerald-100 dark:bg-emerald-900/30 flex items-center justify-center">
      <svg class="w-8 h-8 text-emerald-600 dark:text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
    </div>
    <h3 class="text-lg font-semibold mb-2">No schedules yet</h3>
    <p class="text-gray-500 dark:text-gray-400 mb-4">Create your first schedule to start automating posts</p>
    <button @click="showForm = true" class="px-4 py-2 bg-li-blue hover:bg-li-blue-dark text-white rounded-lg font-medium transition">+ Create schedule</button>
  </div>

  <div x-show="schedules.length > 0" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
    <template x-for="s in schedules" :key="s.id">
      <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 p-5 hover:shadow-lg hover:-translate-y-0.5 transition">
        <div class="flex items-start justify-between mb-3">
          <h3 class="font-semibold text-lg" x-text="s.name"></h3>
          <span :class="s.enabled ? 'bg-emerald-100 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-300' : 'bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400'" class="px-2 py-0.5 text-xs font-medium rounded-full" x-text="s.enabled ? 'Enabled' : 'Disabled'"></span>
        </div>
        <div class="font-mono text-sm bg-gray-50 dark:bg-gray-800 px-3 py-2 rounded-md mb-3" x-text="s.cron"></div>
        <p class="text-sm text-gray-600 dark:text-gray-400 mb-3 line-clamp-2" x-text="s.body || '(uses template: ' + s.template + ')'"></p>
        <div class="text-xs text-gray-500 mb-4" x-text="'Last run: ' + (s.last_run || 'never')"></div>
        <div class="flex gap-2">
          <button @click="run(s)" class="flex-1 px-3 py-1.5 text-sm bg-li-blue hover:bg-li-blue-dark text-white rounded-md transition">Run</button>
          <button class="flex-1 px-3 py-1.5 text-sm bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 rounded-md transition">Edit</button>
          <button @click="remove(s)" class="px-3 py-1.5 text-sm bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 hover:bg-red-100 dark:hover:bg-red-900/30 rounded-md transition">Delete</button>
        </div>
      </div>
    </template>
  </div>
  </div>


<script>
function schedulesPanel() {
  return {
    dark: document.documentElement.classList.contains('dark'),
    showForm: false,
    schedules: [],
    form: { name: '', cron: '0 9 * * 1-5', template: '', body: '' },
    async init() { await this.load(); },
    async load() {
      try { const r = await fetch('/api/schedules'); if (r.ok) this.schedules = await r.json(); } catch (e) { this.schedules = []; }
    },
    async create() {
      try { const r = await fetch('/api/schedules', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(this.form) }); if (r.ok) { await this.load(); this.showForm = false; this.form = { name: '', cron: '0 9 * * 1-5', template: '', body: '' }; } } catch (e) {}
    },
    async run(s) { try { await fetch('/api/schedules/' + s.id + '/run', { method: 'POST' }); await this.load(); } catch (e) {} },
    async remove(s) { if (!confirm('Delete this schedule?')) return; try { await fetch('/api/schedules/' + s.id, { method: 'DELETE' }); await this.load(); } catch (e) {} }
  }
}
</script>
</main>
</body>
</html>
